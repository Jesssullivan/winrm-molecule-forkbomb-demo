---
# Main inventory. Customize host/port in group_vars/site.yml (see site.yml.example).
all:
  children:
    demo_servers:
      hosts:
        win-target:
          ansible_host: "{{ tunnel_local_host | default('localhost') }}"
          ansible_connection: winrm
          ansible_port: "{{ tunnel_local_port | default(15986) }}"
          ansible_winrm_scheme: https
          ansible_winrm_transport: ntlm
          ansible_winrm_server_cert_validation: ignore
          ansible_winrm_operation_timeout_sec: 120
          ansible_winrm_read_timeout_sec: 180

    # Same host but using PSRP connection plugin for benchmarking comparison
    psrp_targets:
      hosts:
        win-target-psrp:
          ansible_host: "{{ tunnel_local_host | default('localhost') }}"
          ansible_connection: psrp
          ansible_port: "{{ tunnel_local_port | default(15986) }}"
          ansible_psrp_protocol: https
          ansible_psrp_auth: ntlm
          ansible_psrp_cert_validation: false
          ansible_psrp_operation_timeout: 120
          ansible_psrp_read_timeout: 180
          ansible_psrp_reconnection_retries: 3
