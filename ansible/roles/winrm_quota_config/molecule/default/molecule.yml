---
driver:
  name: default
  options:
    managed: false

platforms:
  - name: win-target
    managed: false

provisioner:
  name: ansible
  inventory:
    links:
      hosts: ../../../../molecule/inventory.yml
  env:
    OBJC_DISABLE_INITIALIZE_FORK_SAFETY: "YES"

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - syntax
    - converge
    - verify
