---
# Restarting WinRM kills the connection we're using, so this task will
# always fail with "Connection reset by peer". We use async + ignore to
# fire the restart and reconnect after a brief wait.
- name: restart winrm
  ansible.windows.win_shell: |
    Start-Sleep -Seconds 2
    Restart-Service WinRM -Force
  async: 30
  poll: 0
  ignore_errors: true
  ignore_unreachable: true

- name: wait for winrm to come back
  ansible.windows.win_ping:
  retries: 10
  delay: 5
  register: _winrm_ping
  until: _winrm_ping is success
  listen: restart winrm
