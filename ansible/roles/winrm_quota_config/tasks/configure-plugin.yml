---
# Configure the microsoft.powershell plugin quotas.
# These are the HIDDEN SECOND LAYER that most documentation misses.
# Effective WinRM limit = min(Shell quota, Plugin quota).
# Plugin defaults are often LOWER than Shell defaults.

- name: Set Plugin MaxShells
  ansible.windows.win_shell: >-
    $path = 'WSMan:\localhost\Plugin\microsoft.powershell\Quotas\MaxShells';
    $current = (Get-Item $path).Value;
    if ($current -ne '{{ winrm_quota_plugin_max_shells }}') {
      Set-Item $path -Value {{ winrm_quota_plugin_max_shells }};
      Write-Output 'changed'
    } else {
      Write-Output 'ok'
    }
  register: _set_plugin_max_shells
  changed_when: "'changed' in _set_plugin_max_shells.stdout"

