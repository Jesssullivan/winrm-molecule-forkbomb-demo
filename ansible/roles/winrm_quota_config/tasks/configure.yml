---
# Set WSMan quota values. Each task compares the current value to the desired
# value and only reports changed when an actual modification occurs.

- name: Set MaxShellsPerUser
  ansible.windows.win_shell: >-
    $current = (Get-Item WSMan:\localhost\Shell\MaxShellsPerUser).Value;
    if ($current -ne '{{ winrm_quota_max_shells_per_user }}') {
      Set-Item WSMan:\localhost\Shell\MaxShellsPerUser -Value {{ winrm_quota_max_shells_per_user }};
      Write-Output 'changed'
    } else {
      Write-Output 'ok'
    }
  register: _set_max_shells
  changed_when: "'changed' in _set_max_shells.stdout"
  # NOTE: WSMan quotas take effect immediately on new shell creation.
  # Do NOT restart WinRM — it kills the management connection and is
  # often unrecoverable over WinRM. See finding-winrm-restart-20260313.md.

