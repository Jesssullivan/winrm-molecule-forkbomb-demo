---
driver:
  name: default

platforms:
  - name: win-target
    managed: false

provisioner:
  name: ansible
  inventory:
    links:
      hosts: ../../../../inventory/hosts.yml
      group_vars: ../../../../inventory/group_vars
  env:
    OBJC_DISABLE_INITIALIZE_FORK_SAFETY: "YES"

verifier:
  name: ansible
