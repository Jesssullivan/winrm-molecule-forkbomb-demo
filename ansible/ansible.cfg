[defaults]
# Forks controls parallel host connections. Default 5 is conservative.
# This is the key setting that interacts with WinRM's MaxShellsPerUser quota.
# Each fork creates a separate authenticated WinRM session via pywinrm.
# With pywinrm (not pypsrp), there is NO connection pooling - each task
# in each fork spawns a new WinRM shell.
#
# The forkbomb scenario:
#   forks=50 × tasks_per_role=15 = 750 shell creation attempts
#   MaxShellsPerUser=30 (Windows default) → quota exceeded after 30
#   Quota exceeded → "credentials rejected" error
#   Ansible retries auth → each retry = failed AD auth attempt
#   5 failed AD attempts in 15 min → account lockout (all hosts locked)
forks = 5

# Gathering strategy - 'smart' caches facts to avoid redundant connections
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/forkbomb-demo-facts
fact_caching_timeout = 3600

roles_path = roles
collections_path = collections

# Retry files clutter the repo
retry_files_enabled = false

# Callbacks for timing visibility during benchmarks
callbacks_enabled = timer, profile_tasks
callback_whitelist = timer, profile_tasks

[privilege_escalation]
become = false

# WinRM connection settings
# These interact with Windows WinRM service quotas:
#   MaxShellsPerUser: 30 (default) - max concurrent shells per user
#   MaxConcurrentUsers: 10 (default) - max concurrent user sessions
#   MaxProcessesPerShell: 25 (default) - max processes per shell
#   IdleTimeout: 7200000ms (default, 2 hours) - stale shell cleanup
#
# Without connection reuse, each Ansible task creates a new WinRM session
# and a new authentication attempt. This is the root cause of the forkbomb.
# Use `serial: 1` in molecule converge.yml for Windows hosts to mitigate.
[persistent_connection]
connect_timeout = 120
command_timeout = 120
